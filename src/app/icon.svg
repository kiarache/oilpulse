<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="drop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#9a3412"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="245" fill="url(#bg)" stroke="#1e3a5f" stroke-width="6"/>
  <!-- Oil drop -->
  <path d="M256 72 C256 72 152 220 152 310 C152 367.4 199.6 416 256 416 C312.4 416 360 367.4 360 310 C360 220 256 72 256 72Z" fill="url(#drop)" opacity="0.95"/>
  <!-- Highlight on drop -->
  <ellipse cx="220" cy="280" rx="28" ry="45" fill="white" opacity="0.18" transform="rotate(-15 220 280)"/>
  <!-- Pulse line across drop -->
  <polyline points="152,310 200,310 225,270 255,350 285,250 310,330 340,310 360,310" fill="none" stroke="url(#pulse)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
